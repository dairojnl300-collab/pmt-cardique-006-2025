<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>PMT v2 — Inspección de Campo</title>
<style>
:root{--or:#E85D04;--or2:#FF6B1A;--ord:#C44B00;--vd:#2DC653;--rj:#E63946;--am:#FFBE0B;--bg:#111827;--bg2:#1F2937;--cd:#1E293B;--cd2:#243447;--br:#334155;--tx:#E8E8F0;--dm:rgba(240,240,245,.55)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{padding-bottom:76px;min-height:100vh}
header{background:linear-gradient(135deg,var(--or),var(--or2) 55%,var(--ord));padding:14px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(232,93,4,.4);position:relative}
.h-row{display:flex;flex-direction:column;align-items:center;text-align:center}
.h-tit{font-size:20px;font-weight:900;letter-spacing:.5px;color:#fff;line-height:1;text-transform:uppercase}
.h-sub{font-size:10px;font-weight:700;color:rgba(255,255,255,.8);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px}
.h-bdg{background:rgba(0,0,0,.25);border-radius:0;padding:4px 8px;font-size:9px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:.5px;text-align:right;line-height:1.4;position:absolute;top:12px;right:16px}
.meta-bar{background:var(--bg2);padding:10px 16px;border-bottom:1px solid var(--br)}
.meta-row{display:flex;gap:10px;margin-bottom:6px}
.meta-row:last-child{margin-bottom:0}
.meta-lbl{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.meta-bar input{width:100%;background:var(--bg);border:1px solid var(--br);border-radius:8px;color:var(--tx);font-family:inherit;font-size:12px;padding:7px 10px;outline:none;-webkit-appearance:none;appearance:none}
.meta-bar input:focus{border-color:var(--or)}
.meta-field{flex:1}
.prog{background:var(--bg2);padding:12px 16px;border-bottom:1px solid var(--br)}
.prog-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-lbl{font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:1px}
.prog-pct{font-size:22px;font-weight:900;color:var(--or)}
.bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bar-f{height:100%;background:linear-gradient(90deg,var(--or),var(--am));border-radius:3px;transition:width .4s;width:0%}
.tabs{display:flex;overflow-x:auto;background:var(--bg2);padding:8px 16px 0;gap:6px;border-bottom:2px solid var(--br);scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:8px 13px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;cursor:pointer;border:none;background:var(--cd);color:var(--dm);transition:all .2s;text-transform:uppercase;letter-spacing:.5px;text-align:center;line-height:1.2}
.tab.active{background:var(--or);color:#fff}
.tab .pct{display:block;font-size:14px;font-weight:900;margin-top:1px}
.content{padding:12px 16px}
.panel{display:none}.panel.active{display:block}
.fc{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.fc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.fc-name{font-size:11px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:1px}
.fc-pct{font-size:20px;font-weight:900}
.fc-coords{font-size:10px;color:var(--dm);margin-top:4px}
.frente-actions{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.hora-frente-wrap{flex:1;display:flex;align-items:center;gap:6px}
.hora-frente-lbl{font-size:10px;font-weight:700;color:var(--dm);white-space:nowrap}
.hora-frente-input{background:var(--bg);border:1px solid var(--br);border-radius:8px;color:var(--tx);font-family:inherit;font-size:12px;padding:6px 8px;outline:none;-webkit-appearance:none;appearance:none;width:110px}
.hora-frente-input:focus{border-color:var(--or)}
.limpiar-frente-btn{background:rgba(230,57,70,.12);border:1px solid rgba(230,57,70,.3);border-radius:8px;padding:6px 10px;cursor:pointer;font-size:10px;color:var(--rj);font-family:inherit;font-weight:700;white-space:nowrap;transition:all .2s}
.limpiar-frente-btn:active{background:rgba(230,57,70,.25)}
.sec{background:var(--cd);border:1px solid var(--br);border-radius:12px;margin-bottom:10px;overflow:hidden}
.sec-h{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;cursor:pointer;background:var(--cd2);user-select:none;-webkit-user-select:none}
.sec-h:active{opacity:.85}
.sec-lbl{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.sec-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.sec-cnt{font-size:11px;font-weight:600;color:var(--dm);margin-right:6px}
.chv{font-size:11px;color:var(--dm);display:inline-block;transition:transform .25s}
.sec.open .chv{transform:rotate(180deg)}
.sec-b{display:none}.sec.open .sec-b{display:block}
.item{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;-webkit-user-select:none;user-select:none;flex-wrap:wrap}
.item:last-child{border-bottom:none}
.item.done{background:rgba(45,198,83,.04)}
.chk{flex-shrink:0;width:22px;height:22px;border-radius:6px;border:2px solid #4B5563;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;transition:all .18s;margin-top:1px}
.item.done .chk{background:var(--vd);border-color:var(--vd)}
.item-t{flex:1;font-size:13px;line-height:1.4;transition:all .18s}
.item.done .item-t{color:var(--dm);text-decoration:line-through}
.crit{flex-shrink:0;background:rgba(230,57,70,.18);color:var(--rj);font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px;margin-top:3px;white-space:nowrap}
.item-actions{display:flex;gap:6px;margin-left:auto}
.edit-btn,.delete-btn{background:var(--cd2);border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:11px;color:var(--dm);transition:all .2s}
.edit-btn:hover,.delete-btn:hover{background:var(--or);color:#fff}
.cumple-row{display:flex;gap:12px;margin-left:32px;margin-bottom:8px;margin-top:-4px;flex-wrap:wrap}
.btn-cumple{display:flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;background:var(--bg);border:1px solid var(--br);color:var(--dm);transition:all .2s}
.btn-cumple.activo-si{background:rgba(45,198,83,.2);border-color:var(--vd);color:#4ade80}
.btn-cumple.activo-no{background:rgba(230,57,70,.2);border-color:var(--rj);color:#f87171}
/* Bug #8: críticos sin calificar — borde parpadeante */
@keyframes pulse-warn{0%,100%{border-color:rgba(255,190,11,.3)}50%{border-color:var(--am)}}
.warn-crit{animation:pulse-warn 1.5s ease-in-out infinite;border-color:var(--am)!important}
.add-item-btn{background:var(--cd2);border:1px solid var(--br);border-radius:10px;padding:8px 12px;margin:8px 0 16px 0;cursor:pointer;font-size:12px;color:var(--dm);display:flex;align-items:center;gap:8px;justify-content:center;width:100%}
.add-item-btn:hover{background:var(--or);color:#fff}
.nota-w{background:var(--cd);border:1px solid var(--br);border-radius:12px;overflow:hidden;margin-bottom:10px}
.nota-lbl{padding:8px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dm);background:var(--cd2);border-bottom:1px solid var(--br)}
.nota-w textarea{width:100%;background:transparent;border:none;color:var(--tx);font-family:inherit;font-size:13px;padding:10px 14px;resize:none;min-height:68px;outline:none}
.nota-w textarea::placeholder{color:var(--dm)}
.inc-w{background:rgba(230,57,70,.07);border:1px solid rgba(230,57,70,.28);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.inc-tit{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--rj);margin-bottom:10px}
.inc-w select,.inc-w input[type=text],.inc-w input[type=time]{width:100%;background:var(--bg);border:1px solid rgba(230,57,70,.3);border-radius:7px;color:var(--tx);font-family:inherit;font-size:12px;padding:8px 10px;margin-bottom:7px;outline:none;-webkit-appearance:none;appearance:none}
.inc-w select option{background:var(--bg)}
.inc-r2{display:flex;gap:8px}.inc-r2 input{flex:1;margin-bottom:0}
.inc-check-row{display:flex;align-items:center;gap:8px;margin-top:2px;font-size:12px;color:var(--dm)}
.inc-check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--rj);flex-shrink:0}
.res-card{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:14px;margin-bottom:10px}
.res-frt{font-size:18px;font-weight:900;color:var(--or);margin-bottom:8px;letter-spacing:.5px;text-transform:uppercase}
.res-row{display:flex;justify-content:space-between;font-size:12px;color:var(--dm);padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.res-row:last-child{border:none}
.res-row span:last-child{font-weight:700;color:var(--tx)}
.est{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.est-ok{background:rgba(45,198,83,.18);color:var(--vd)}
.est-par{background:rgba(255,190,11,.18);color:var(--am)}
.est-pen{background:rgba(232,93,4,.18);color:var(--or)}
.exp-box{background:var(--cd);border:1px solid var(--br);border-radius:12px;padding:14px;margin-bottom:10px}
.exp-tit{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin-bottom:12px}
.exp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ebtn{display:flex;flex-direction:column;align-items:center;gap:5px;color:#fff;font-family:inherit;font-size:11px;font-weight:700;padding:14px 8px;border-radius:12px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;-webkit-appearance:none;min-height:72px;justify-content:center}
.ebtn:active{opacity:.8;transform:scale(.97)}
.ei{font-size:20px}
.e1{background:linear-gradient(135deg,#059669,#10B981)}
.e2{background:linear-gradient(135deg,var(--ord),var(--or))}
.e3{background:linear-gradient(135deg,#7C3AED,#9F67FF)}
.e4{background:linear-gradient(135deg,#0369A1,#0EA5E9)}
.exp-hint{font-size:10px;color:var(--dm);line-height:1.7}
#pdf-ov{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;z-index:10000;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none}
.pdf-toolbar{position:sticky;top:0;background:#fff;padding:10px 14px;display:flex;gap:8px;border-bottom:3px solid #E85D04;z-index:1}
.pdf-btn-print{flex:1;background:#E85D04;color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.pdf-btn-close{background:#F1F5F9;color:#475569;border:none;padding:12px 16px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer}
.pdf-body{padding:16px;font-family:Arial,sans-serif;font-size:11px;color:#111;max-width:780px;margin:auto}
@media print{#pdf-ov .pdf-toolbar{display:none!important}.pdf-body{padding:0}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--cd2);color:var(--tx);font-size:12px;font-weight:700;padding:10px 20px;border-radius:30px;z-index:20000;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid var(--br);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.show{opacity:1}
.toast.ok{background:var(--vd);color:#fff;border:none}
.toast.err{background:var(--rj);color:#fff;border:none}
.nav-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--br);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;background:none;border:none;color:var(--dm);font-family:inherit;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;gap:3px;transition:color .2s}
.nav-btn.active{color:var(--or)}
.nav-ico{font-size:18px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stat-card{background:var(--cd);border-radius:12px;padding:14px;text-align:center;border:1px solid var(--br)}
.stat-number{font-size:28px;font-weight:900;color:var(--or)}
.stat-label{font-size:10px;color:var(--dm);margin-top:4px}
.score-card{background:var(--cd);border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid var(--br)}
.score-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin-bottom:10px}
.score-num{font-size:42px;font-weight:900;line-height:1}
.score-formula{font-size:10px;color:var(--dm);margin-top:6px;line-height:1.5}
.chart-bar-item{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.chart-bar-label{width:90px;font-size:11px;font-weight:600}
.chart-bar-bg{flex:1;height:28px;background:var(--br);border-radius:6px;overflow:hidden}
.chart-bar-fill{height:100%;background:linear-gradient(90deg,var(--or),var(--or2));border-radius:6px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:700;color:#fff}
.stats-table{width:100%;font-size:11px;border-collapse:collapse}
.stats-table th,.stats-table td{padding:8px 6px;text-align:left;border-bottom:1px solid var(--br)}
.stats-table th{color:var(--dm);font-weight:700}
.cumple-badge{display:inline-block;padding:2px 6px;border-radius:10px;font-size:9px;font-weight:600}
.cumple-si{background:rgba(45,198,83,.2);color:#4ade80}
.cumple-no{background:rgba(230,57,70,.2);color:#f87171}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="pdf-ov" style="display:none;">
  <div class="pdf-toolbar">
    <button class="pdf-btn-print" onclick="window.print()">🖨️ Imprimir / Guardar como PDF</button>
    <button class="pdf-btn-close" onclick="cerrarPDF()">✕ Cerrar</button>
  </div>
  <div class="pdf-body" id="pdf-body"></div>
</div>
<header>
  <div class="h-row">
    <div class="h-tit">PMT — Inspección de Campo</div>
    <div class="h-sub">Ciénaga de la Virgen</div>
  </div>
  <div class="h-bdg">LP-CARDIQUE<br>006-2025</div>
</header>
<div class="meta-bar">
  <div class="meta-row">
    <div class="meta-field">
      <div class="meta-lbl">📅 Fecha</div>
      <input type="date" id="inp-fecha">
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-field">
      <div class="meta-lbl">👷 Residente de Obra</div>
      <input type="text" id="inp-residente" placeholder="Nombre residente" autocomplete="off">
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-field">
      <div class="meta-lbl">🔍 Inspector Interventoría</div>
      <input type="text" id="inp-interventoria" placeholder="Nombre inspector interventoría" autocomplete="off">
    </div>
  </div>
  <div class="meta-row">
    <div class="meta-field">
      <div class="meta-lbl">🏛️ Supervisor CARDIQUE</div>
      <input type="text" id="inp-cardique" placeholder="Nombre supervisor CARDIQUE" autocomplete="off">
    </div>
  </div>
</div>
<div class="prog">
  <div class="prog-row"><span class="prog-lbl">Cumplimiento (CUMPLE)</span><span class="prog-pct" id="pct-g">0%</span></div>
  <div class="bar"><div class="bar-f" id="bar-g"></div></div>
</div>
<div class="tabs" id="tabs-bar"></div>
<div class="content" id="content-area"></div>
<div class="nav-bar" id="nav-bar"></div>

<script>
// ============================================================
// DATOS — var D
// Estructura: { [frente]: { label, em, col, long, coords, secs: [{ id, lbl, its: [{id, t, c?}] }] } }
// c:1 = crítico (peso doble en score ponderado)
// ============================================================
var D = {
  calicanto: {
    label: "Calicanto", em: "🔵", col: "#3B82F6",
    long: "779 m",
    coords: "10°25'31.61\"N 75°28'48.85\"O → 10°25'24.20\"N 75°28'25.30\"O",
    secs: [
      { id: "c-se", lbl: "🚧 Señalización", its: [
        {id:"c1",  t:"Señal INICIO DE OBRA instalada (100 m antes del frente)", c:1},
        {id:"c2",  t:"Señal FIN DE OBRA instalada correctamente", c:1},
        {id:"c3",  t:"Señales VELOCIDAD MÁXIMA 30 km/h en Cll. 47 y Cra. 82", c:1},
        {id:"c4",  t:"Señales ENTRADA Y SALIDA DE VOLQUETAS verificadas (13 und. en Cra. 82)"},
        {id:"c5",  t:"Señal ZONA DE ACOPIO visible en Isla de León – Nuevo Mundo"},
        {id:"c6",  t:"Todas las señales en buen estado: visibles, reflectivas, sin daños"},
        {id:"c7",  t:"Señalización móvil (conos, cinta de peligro, vallas) bien ubicada"}
      ]},
      { id: "c-ac", lbl: "📦 Zona de Acopio", its: [
        {id:"c8",  t:"Zona de acopio 250 m² activa y delimitada"},
        {id:"c9",  t:"Zona de acopio 2.5 Ha activa y organizada"},
        {id:"c10", t:"Acceso libre para maniobra de volquetas"},
        {id:"c11", t:"Material excavado ordenado y cubierto"},
        {id:"c12", t:"Permiso del propietario del predio vigente y disponible"}
      ]},
      { id: "c-ru", lbl: "🛣️ Rutas de Acceso", its: [
        {id:"c13", t:"Av. Pedro Romero: acceso sin obstrucciones en la intersección", c:1},
        {id:"c14", t:"Ruta Acopio → Cll. 47 (≈1.5 km) transitable"},
        {id:"c15", t:"Giro izq. Cra. 82 habilitado para volquetas"},
        {id:"c16", t:"Ruta El Pozón → Cra. 92 → Ciudadela de la Paz (≈2.3 km) despejada"},
        {id:"c17", t:"Vías sin encharcamientos ni hundimientos por lluvia"},
        {id:"c18", t:"Vías libres de derrame de material por volquetas"}
      ]},
      { id: "c-pe", lbl: "👷 Personal y Paleteros", its: [
        {id:"c19", t:"Paletero presente en cruce Cll. 47 / Cra. 82", c:1},
        {id:"c20", t:"Conductores respetan velocidad máx. 30 km/h", c:1},
        {id:"c21", t:"Paletero usa chaleco reflectivo, casco, botas y lentes"},
        {id:"c22", t:"Paleta PARE/SIGA en buen estado y usada correctamente"},
        {id:"c23", t:"Reductores de velocidad removibles instalados en sector residencial"}
      ]},
      { id: "c-pa", lbl: "🚶 Peatones y Ciclistas", its: [
        {id:"c24", t:"Andenes (≈1 m) libres de obstrucciones por obra"},
        {id:"c25", t:"Senderos peatonales provisionales habilitados donde aplique"},
        {id:"c26", t:"Ciclistas identificados — señalización de precaución visible"},
        {id:"c27", t:"Accesibilidad garantizada para personas con discapacidad (rampa provisional o guía táctil)", c:1},
        {id:"c28", t:"Separación física entre zona de trabajo y circulación peatonal (barrera rígida o valla)", c:1}
      ]},
      { id: "c-in", lbl: "📊 Indicadores", its: [
        {id:"c29", t:"Señalización instalada ≥ 90% de lo requerido (meta semanal)", c:1},
        {id:"c30", t:"Continuidad sendero peatonal = 100% (meta semanal)", c:1},
        {id:"c31", t:"Registro fotográfico del frente diligenciado hoy"},
        {id:"c32", t:"Bitácora de control de vehículos actualizada"}
      ]}
    ]
  },
  chaplundun: {
    label: "Chaplundún", em: "🟡", col: "#F59E0B",
    long: "350 m",
    coords: "10°25'17.12\"N 75°28'48.03\"O → 10°25'9.10\"N 75°28'39.40\"O",
    secs: [
      { id: "h-se", lbl: "🚧 Señalización", its: [
        {id:"h1",  t:"Señal INICIO DE OBRA instalada en Cll. 48", c:1},
        {id:"h2",  t:"Señal FIN DE OBRA al final del tramo", c:1},
        {id:"h3",  t:"Señales VELOCIDAD MÁXIMA 30 km/h en corredor Cra. 80 / Cll. 47", c:1},
        {id:"h4",  t:"Señales ENTRADA Y SALIDA DE VOLQUETAS en Cll. 48 y Cra. 80"},
        {id:"h5",  t:"Señal ZONA DE ACOPIO visible en sector Chaplundún (1.000 m²)"},
        {id:"h6",  t:"Señales en buen estado: visibles, reflectivas, sin daños"},

function save(){
  try{
    localStorage.setItem(SK, JSON.stringify({
      checks: checks, cumple: cumple, notas: notas, inc: inc,
      openSecs: openSecs, activeTab: activeTab,
      fecha: $("inp-fecha").value||"",
      inspResidente: $("inp-residente").value||"",
      inspInterventoria: $("inp-interventoria").value||"",
      inspCardique: $("inp-cardique").value||"",
      horaFrente: horaFrente,
      itemNotas: itemNotas,
      fotosFrente: fotosFrente
    }));
  }catch(e){}
}

function load(){
  try{
    var s = localStorage.getItem(SK);
    if(!s) return;
    var d = JSON.parse(s);
    if(d.checks) checks = d.checks;
    if(d.cumple) cumple = d.cumple;
    if(d.notas) notas = Object.assign({}, notas, d.notas);
    if(d.inc) {
      for(var k in d.inc){
        if(!inc[k]) inc[k]={tipo:"",desc:"",hora:"",acc:"",gravedad:"",reportado:false};
        inc[k] = Object.assign(inc[k], d.inc[k]);
      }
    }
    if(d.openSecs) openSecs = Object.assign({}, openSecs, d.openSecs);
    if(d.activeTab) activeTab = d.activeTab;
    if(d.horaFrente) horaFrente = Object.assign({}, horaFrente, d.horaFrente);
    if(d.itemNotas) itemNotas = d.itemNotas;
    if(d.fotosFrente) fotosFrente = Object.assign({calicanto:[],chaplundun:[],ricaurte:[]}, d.fotosFrente);
    setTimeout(function(){
      if(d.fecha) $("inp-fecha").value = d.fecha;
      if(d.inspResidente) $("inp-residente").value = d.inspResidente;
      if(d.inspInterventoria) $("inp-interventoria").value = d.inspInterventoria;
      if(d.inspCardique) $("inp-cardique").value = d.inspCardique;
    }, 30);
  }catch(e){}
}

// CÁLCULOS
// ============================================================
function prog(k){
  var its = D[k].secs.reduce(function(a,s){return a.concat(s.its)},[]);
  var d = its.filter(function(i){return checks[i.id] && cumple[i.id]===true}).length;
  return {t:its.length, d:d, p:its.length ? Math.round(d/its.length*100) : 0};
}

function gProg(){
  var its = Object.values(D).reduce(function(a,f){return a.concat(f.secs.reduce(function(b,s){return b.concat(s.its)},[])) },[]);
  var d = its.filter(function(i){return checks[i.id] && cumple[i.id]===true}).length;
  return {t:its.length, d:d, p:its.length ? Math.round(d/its.length*100) : 0};
}

function gProgCumpleReal(){
  var its = Object.values(D).reduce(function(a,f){return a.concat(f.secs.reduce(function(b,s){return b.concat(s.its)},[])) },[]);
  var d = its.filter(function(i){return checks[i.id] && cumple[i.id]===true}).length;
  return {t:its.length, d:d, p:its.length ? Math.round(d/its.length*100) : 0};
}

// Score ponderado: críticos valen 2x
function calcScore(){
  var its = Object.values(D).reduce(function(a,f){return a.concat(f.secs.reduce(function(b,s){return b.concat(s.its)},[])) },[]);
  var critT=0, critC=0, normT=0, normC=0;
  its.forEach(function(it){
    if(it.c){critT++; if(checks[it.id]&&cumple[it.id]===true)critC++;}
    else{normT++; if(checks[it.id]&&cumple[it.id]===true)normC++;}
  });
  var denom = critT*2 + normT;
  var num   = critC*2 + normC;
  return denom ? Math.round(num/denom*100) : 0;
}

function fmtF(v){
  if(!v) return "—";
  var p=v.split("-");
  if(p.length<3) return v;
  var meses=["enero","febrero","marzo","abril","mayo","junio","julio","agosto","septiembre","octubre","noviembre","diciembre"];
  return parseInt(p[2])+" de "+meses[parseInt(p[1])-1]+" de "+p[0];
}

function toast(msg, tipo){
  var el = $("toast");
  el.textContent = msg;
  el.className = "toast show" + (tipo?" "+tipo:"");
  setTimeout(function(){el.className="toast"}, 2600);
}

function upd(){
  var g = gProg();
  $("pct-g").textContent = g.p + "%";
  $("bar-g").style.width = g.p + "%";
  for(var k in D){
    var p = prog(k);
    var tp = $("tab-pct-"+k); if(tp) tp.textContent = p.p + "%";
    var fp = $("pct-fp-"+k); if(fp){ fp.textContent = p.p + "%"; fp.style.color = D[k].col; }
    var bfp = $("bar-fp-"+k); if(bfp){ bfp.style.width = p.p + "%"; bfp.style.background = D[k].col; }
    // contadores por sección
    for(var si=0;si<D[k].secs.length;si++){
      var s = D[k].secs[si];
      var sc = $("cnt-"+s.id);
      if(sc){
        var sd = s.its.filter(function(i){return checks[i.id] && cumple[i.id]===true}).length;
        sc.textContent = sd + "/" + s.its.length;
        sc.style.color = (sd===s.its.length)? "var(--vd)" : "";
      }
    }
  }
  // warn-crit: ítems críticos inspeccionados sin calificar
  document.querySelectorAll(".item[id^='itm-']").forEach(function(el){
    var id = el.id.replace("itm-","");
    // buscar si es crítico
    var esCrit = false;
    for(var k in D){ for(var si=0;si<D[k].secs.length;si++){ var found=D[k].secs[si].its.find(function(x){return x.id===id}); if(found&&found.c){esCrit=true;break;} } if(esCrit)break;}
    if(esCrit && checks[id] && cumple[id]===undefined){
      el.classList.add("warn-crit");
    } else {
      el.classList.remove("warn-crit");
    }
  });
}

  var h = "";
  for(var k in D){ h += buildFrenteHTML(k); }
  h += '<div class="panel" id="panel-resumen"><div id="res-inner"></div></div>';
  h += '<div class="panel" id="panel-estadisticas"><div id="stats-inner"></div></div>';

      var hora=document.getElementById("inc-h-"+k);

function switchTab(k, sv){
  if(sv===undefined) sv=true;
  activeTab = k;
  document.querySelectorAll(".panel").forEach(function(el){el.classList.remove("active")});
  document.querySelectorAll(".tab").forEach(function(el){el.classList.remove("active")});
  document.querySelectorAll(".nav-btn").forEach(function(el){el.classList.remove("active")});
  var panel = document.getElementById("panel-"+k); if(panel) panel.classList.add("active");
  var tab = document.getElementById("tab-"+k); if(tab) tab.classList.add("active");
  var nav = document.getElementById("nav-"+k); if(nav) nav.classList.add("active");
  if(k==="resumen") renderRes();
  if(k==="estadisticas") renderStats();
  if(k==="historial") renderHistorial();
  if(sv) save();
  window.scrollTo({top:0, behavior:"smooth"});
}

// togCheck actualiza DOM directamente
function togCheck(id){
  checks[id] = !checks[id];
  var itm = document.getElementById("itm-"+id);
  var chk = document.getElementById("chk-"+id);
  var row = document.getElementById("cumple-row-"+id);

  if(checks[id]){
    if(itm){ itm.classList.add("done"); }
    if(chk){ chk.textContent = ""; }
    if(row){ row.style.display = "flex"; }
  } else {
    cumple[id] = undefined;
    if(itm){ itm.classList.remove("done"); itm.classList.remove("warn-crit"); }
    if(chk){ chk.textContent = ""; }
    if(row){ row.style.display = "none"; }
    var obsWrap2 = document.getElementById("obs-wrap-" + id);
    if(obsWrap2) obsWrap2.style.display = "none";
    // Limpiar botones cumple
    var bs = document.getElementById("cumple-si-"+id);
    var bn = document.getElementById("cumple-no-"+id);
    if(bs) bs.classList.remove("activo-si");
    if(bn) bn.classList.remove("activo-no");
  }
  upd();
  save();
}

function togSec(id){
  openSecs[id] = !openSecs[id];
  var s = document.getElementById("sec-"+id);
  if(s){ if(openSecs[id]) s.classList.add("open"); else s.classList.remove("open"); }
  save();
}

function setCumple(id, valor){
  if(!checks[id]) return;
  cumple[id] = valor;
  var btnSi = document.getElementById("cumple-si-"+id);
  var btnNo = document.getElementById("cumple-no-"+id);
  var itm   = document.getElementById("itm-"+id);
  if(btnSi && btnNo){
    if(valor===true){
      btnSi.classList.add("activo-si"); btnNo.classList.remove("activo-no");
    } else if(valor===false){
      btnNo.classList.add("activo-no"); btnSi.classList.remove("activo-si");
    }
  }
  // quitar warn-crit si ya calificó
  if(itm) itm.classList.remove("warn-crit");
  // Mostrar campo observación cuando el ítem queda calificado
  var obsWrap = document.getElementById("obs-wrap-" + id);
  if(obsWrap) obsWrap.style.display = "block";
  save();
  upd();
  if(activeTab==="estadisticas") renderStats();
}


// Mejora #7: limpiar un frente
function limpiarFrente(k){
  if(!confirm("¿Limpiar TODOS los datos del frente "+D[k].label+"?\nEsto eliminará checks, calificaciones, notas e incidente de este frente. No afecta los demás frentes.")) return;
  // Borrar checks y cumple de ítems de este frente
  for(var si=0;si<D[k].secs.length;si++){
    var its = D[k].secs[si].its;
    for(var ii=0;ii<its.length;ii++){
      delete checks[its[ii].id];
      delete cumple[its[ii].id];
    }
  }
  notas[k] = "";
  horaFrente[k] = "";
  fotosFrente[k] = [];
  inc[k] = {tipo:"",desc:"",hora:"",acc:"",gravedad:"",reportado:false};
  save();
  buildContent();
  switchTab(activeTab, false);
  upd();
  toast("✓ Frente "+D[k].label+" limpiado","ok");
}

function editarItem(secId, idx){

  for(var k in D){ for(var si=0;si<D[k].secs.length;si++){ if(D[k].secs[si].id===secId){ item=D[k].secs[si].its[idx]; break; } } if(item)break; }
  if(item){

      item.t = nuevoTexto.trim();
      save(); buildContent(); switchTab(activeTab,false); upd();
      toast("✓ Ítem editado","ok");
    }
  }

function eliminarItem(secId, idx){
  if(confirm("¿Eliminar este ítem permanentemente?")){
    for(var k in D){ for(var si=0;si<D[k].secs.length;si++){ if(D[k].secs[si].id===secId){
      var idEl = D[k].secs[si].its[idx].id;
      D[k].secs[si].its.splice(idx,1);
      delete checks[idEl]; delete cumple[idEl];
      save(); buildContent(); switchTab(activeTab,false); upd();
      toast("✓ Ítem eliminado","ok"); return;
    }}}
  }
}

function agregarItem(secId){
  var nuevoTexto = prompt("Nuevo ítem:", "Descripción del ítem");
  if(nuevoTexto && nuevoTexto.trim()!==""){
    var esCrit = confirm("¿Marcar como CRÍTICO?");
    var nuevoId = secId+"_n_"+Date.now()+"_"+Math.random().toString(36).substr(2,4);
    for(var k in D){ for(var si=0;si<D[k].secs.length;si++){ if(D[k].secs[si].id===secId){
      D[k].secs[si].its.push({id:nuevoId, t:nuevoTexto.trim(), c:esCrit?1:0});
      save(); buildContent(); switchTab(activeTab,false); upd();
      toast("✓ Ítem agregado","ok"); return;

  }

function agregarFotos(k, input){
  var files = Array.from(input.files);
  if(!files.length) return;
  var pending = files.length;
  files.forEach(function(file){
    var reader = new FileReader();
    reader.onload = function(e){
      if(!fotosFrente[k]) fotosFrente[k] = [];
      fotosFrente[k].push({data: e.target.result, caption: file.name.replace(/\.[^.]+$/,'')});
      pending--;
      if(pending === 0){
        try{ save(); }catch(ex){ toast("⚠ Fotos guardadas solo en sesión (límite localStorage)","err"); }
        renderFotosGrid(k);
        toast("✓ "+files.length+" foto(s) agregada(s)","ok");
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = "";
}

function renderFotosGrid(k){
  var grid = document.getElementById("fotos-grid-"+k);
  if(!grid) return;
  var fArr = fotosFrente[k]||[];
  if(fArr.length===0){
    grid.innerHTML = '<span style="color:var(--dm);font-size:11px;font-style:italic">Sin fotos agregadas</span>';
    return;
  }
  var h = "";
  for(var fi=0;fi<fArr.length;fi++){
    h += '<div style="position:relative;width:calc(50% - 4px)">';
    h += '<img src="'+fArr[fi].data+'" style="width:100%;height:120px;object-fit:cover;border-radius:8px;border:1px solid var(--br)" onclick="verFoto(\''+k+'\','+fi+')">';
    h += '<div style="font-size:10px;color:var(--dm);padding:2px 4px;text-overflow:ellipsis;overflow:hidden;white-space:nowrap">'+(fArr[fi].caption||'')+'</div>';
    h += '<button onclick="event.stopPropagation();borrarFoto(\''+k+'\','+fi+')" style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:22px;height:22px;color:#fff;font-size:12px;cursor:pointer;line-height:1">✕</button>';
    h += '</div>';
  }
  grid.innerHTML = h;
}

function borrarFoto(k, idx){
  if(!confirm("¿Eliminar esta foto?")) return;
  fotosFrente[k].splice(idx, 1);
  try{ save(); }catch(ex){}
  renderFotosGrid(k);
  toast("✓ Foto eliminada","ok");
}

function verFoto(k, idx){
  var foto = (fotosFrente[k]||[])[idx];
  if(!foto) return;
  var ov = document.createElement("div");
  ov.style.cssText = "position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:30000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px";
  ov.onclick = function(){ document.body.removeChild(ov); };
  var img = document.createElement("img");
  img.src = foto.data;
  img.style.cssText = "max-width:100%;max-height:80vh;border-radius:8px;object-fit:contain";
  var cap = document.createElement("div");
  cap.style.cssText = "color:#fff;font-size:12px;margin-top:10px;text-align:center";
  cap.textContent = foto.caption || "";
  ov.appendChild(img); ov.appendChild(cap);
  document.body.appendChild(ov);
}

function validarAntesDe(accion){
  var ins = ($("inp-residente").value||"").trim() || ($("inp-interventoria").value||"").trim() || ($("inp-cardique").value||"").trim();
  if(!ins){
    alert("⚠️ No hay nombre de inspector registrado. Por favor ingresa al menos un inspector antes de exportar.");
    return false;
  }
  // Contar inspeccionados sin calificar
  var sinCalif = 0;
  var critiNoCumple = [];
  var its = Object.values(D).reduce(function(a,f){return a.concat(f.secs.reduce(function(b,s){return b.concat(s.its)},[])) },[]);
  its.forEach(function(it){
    if(checks[it.id] && cumple[it.id]===undefined) sinCalif++;
    if(it.c && checks[it.id] && cumple[it.id]===false) critiNoCumple.push(it.t);
  });
  if(sinCalif>0){
    alert("⚠️ Hay "+sinCalif+" ítem(s) inspeccionado(s) sin calificar (CUMPLE / NO CUMPLE). Revisa antes de "+accion+".");
    return false;
  }
  if(critiNoCumple.length>0){
    var lista = critiNoCumple.slice(0,5).map(function(t){return"• "+t}).join("\n");
    if(critiNoCumple.length>5) lista += "\n... y "+(critiNoCumple.length-5)+" más";
    return confirm("⛔ Hay "+critiNoCumple.length+" ítem(s) CRÍTICO(S) con NO CUMPLE:\n\n"+lista+"\n\n¿Deseas continuar con "+accion+" de todas formas?");
  }
  return true;
}

// ============================================================
// RENDER ESTADÍSTICAS (mejora #12 score ponderado)
// ============================================================
function renderStats(){
  var g = gProgCumpleReal();
  var totalItems=g.t, cumplidosReales=g.d, pendientesReales=totalItems-cumplidosReales;
  var cumplenSi=0, cumplenNo=0;
  var totalNormales=0, totalCriticos=0;
  for(var k in D){for(var si=0;si<D[k].secs.length;si++){var its=D[k].secs[si].its;for(var ii=0;ii<its.length;ii++){var it=its[ii];if(checks[it.id]&&cumple[it.id]===true)cumplenSi++;if(checks[it.id]&&cumple[it.id]===false)cumplenNo++;if(it.c)totalCriticos++;else totalNormales++;}}}

  var score = calcScore();
  var scoreCol = score>=90?"var(--vd)":score>=70?"var(--am)":"var(--rj)";

  var html = '<div class="stats-grid">';
  html += '<div class="stat-card"><div class="stat-number">'+totalItems+'</div><div class="stat-label">Total Ítems</div></div>';
  html += '<div class="stat-card"><div class="stat-number">'+cumplidosReales+'</div><div class="stat-label">CUMPLEN ✅</div></div>';
  html += '<div class="stat-card"><div class="stat-number">'+cumplenNo+'</div><div class="stat-label">NO CUMPLEN ❌</div></div>';
  html += '<div class="stat-card"><div class="stat-number">'+g.p+'%</div><div class="stat-label">Cumplimiento Real</div></div>';
  html += '</div>';

  // Score ponderado
  html += '<div class="score-card">';
  html += '<div class="score-title">⭐ Score de Conformidad Ponderado</div>';
  html += '<div class="score-num" style="color:'+scoreCol+'">'+score+'%</div>';
  html += '<div class="score-formula">Fórmula: (CUMPLEN_CRÍTICOS×2 + CUMPLEN_NORMALES) / (CRÍTICOS×2 + NORMALES) × 100<br>Críticos detectados: '+totalCriticos+' | Normales: '+totalNormales+'</div>';
  html += '</div>';

  html += '<div class="fc"><div class="fc-top"><span class="fc-name">📊 CUMPLIMIENTO POR FRENTE</span></div>';
  for(var k in D){
    var f=D[k], p=prog(k);
    var cumpF=0,ncF=0;
    for(var si=0;si<f.secs.length;si++){var its=f.secs[si].its;for(var ii=0;ii<its.length;ii++){var it=its[ii];if(checks[it.id]&&cumple[it.id]===true)cumpF++;if(checks[it.id]&&cumple[it.id]===false)ncF++;}}
    html+='<div class="chart-bar-item"><div class="chart-bar-label" style="color:'+f.col+'">'+f.em+" "+f.label+'</div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:'+(p.t?p.d/p.t*100:0)+'%;background:'+f.col+'">'+p.d+'/'+p.t+'</div></div></div>';
  }
  // Barra CUMPLE vs NO CUMPLE
  html+='<div class="chart-bar-item"><div class="chart-bar-label">Cumplen ✅</div><div class="chart-bar-bg"><div class="chart-bar-fill" style="width:'+(totalItems?cumplenSi/totalItems*100:0)+'%;background:#2DC653">'+cumplenSi+'</div></div></div>';

function genReporte(){
  var g=gProg(), fch=$("inp-fecha").value||"";

  var intv=$("inp-interventoria").value||"—";
  var card=$("inp-cardique").value||"—";
  var L=["═══════════════════════════════════════════════════════",
         "      PLAN DE MANEJO DE TRÁNSITO — INSPECCIÓN DE CAMPO",
         "         LP-CARDIQUE-006-2025 | Ciénaga de la Virgen",
         "═══════════════════════════════════════════════════════",
         "  Fecha            : "+fmtF(fch),
         "  Residente        : "+res,
         "  Interventoría    : "+intv,
         "  Supervisor CARD. : "+card,
         "  Contratista      : Consorcio CARDIQUE C&E",
         "  Interventoría    : Consorcio Inter CRD Ciénaga",
         "  Avance global    : "+g.p+"% ("+g.d+"/"+g.t+" ítems)",
         "  Generado         : "+new Date().toLocaleString("es-CO"),
         "═══════════════════════════════════════════════════════\n"];
  for(var k in D){
    var f=D[k]; var p=prog(k);
    L.push("▐ FRENTE: "+f.label.toUpperCase()+" ("+f.long+")");
    if(horaFrente[k]) L.push("  Hora inspección: "+horaFrente[k]);
    L.push("  Estado: "+(p.p===100?"CONFORME":p.p>=60?"PARCIAL":"PENDIENTE")+" — "+p.p+"% ("+p.d+"/"+p.t+")");
    L.push("  ─────────────────────────────────────────────────");
    for(var si=0;si<f.secs.length;si++){
      var s=f.secs[si]; L.push("\n  "+s.lbl.toUpperCase());
      for(var ii=0;ii<s.its.length;ii++){
        var it=s.its[ii];
        var estadoCumple="";
        if(checks[it.id]&&cumple[it.id]!==undefined){
          estadoCumple=cumple[it.id]?"  ✅ CUMPLE":"  ❌ NO CUMPLE";
        }else if(checks[it.id]){estadoCumple="  ⏳ SIN CALIFICAR";}
        L.push("    "+(checks[it.id]?"✓":"☐")+"  "+it.t+(it.c?"  [⛔ CRÍTICO]":"")+estadoCumple);
      }
    }
    var n=notas[k]; if(n&&n.trim()){L.push("\n  OBSERVACIONES:");n.split("\n").forEach(function(l){L.push("    "+l)});}
    var iv=inc[k]; if(iv&&(iv.tipo||iv.desc)){
      L.push("\n  INCIDENTE VIAL:");
      if(iv.tipo) L.push("    Tipo: "+iv.tipo);
      if(iv.gravedad) L.push("    Gravedad: "+iv.gravedad);
      if(iv.desc) L.push("    Descripción: "+iv.desc);
      if(iv.hora) L.push("    Hora: "+iv.hora);
      if(iv.acc) L.push("    Acción: "+iv.acc);
      if(iv.reportado) L.push("    ✅ Reportado a autoridades");
    }
    L.push("\n═══════════════════════════════════════════════════════\n");
  }
  L.push("RESUMEN:");
  for(var k in D){var p=prog(k);L.push("  "+D[k].em+" "+D[k].label+": "+p.p+"% — "+(p.p===100?"CONFORME ✓":p.p>=60?"PARCIAL ⚠":"PENDIENTE ✗"));}
  var sc=calcScore();
  L.push("  GLOBAL: "+g.p+"% — "+g.d+"/"+g.t+" ítems | Score Ponderado: "+sc+"%");
  L.push("─────────────────────────────────────────────────────\nPMT v02 · INVIAS 2024");
  return L.join("\n");
}

function compartirTexto(){
  if(!validarAntesDe("compartir")) return;
  var g=gProg();
  var fch=$("inp-fecha").value||"";
  var res=($("inp-residente").value||"—").trim();
  var intv=($("inp-interventoria").value||"—").trim();
  var now=new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
  var cumplenSi=0, cumplenNo=0, sinCalif=0;
  var its=Object.values(D).reduce(function(a,f){return a.concat(f.secs.reduce(function(b,s){return b.concat(s.its)},[])) },[]);
  its.forEach(function(it){
    if(checks[it.id]&&cumple[it.id]===true)cumplenSi++;
    else if(checks[it.id]&&cumple[it.id]===false)cumplenNo++;
    else if(checks[it.id])sinCalif++;
  });
  // críticos NO CUMPLE
  var criticosNoCumple=[];
  its.forEach(function(it){if(it.c&&checks[it.id]&&cumple[it.id]===false)criticosNoCumple.push("⛔ "+it.t);});
  // incidentes
  var numInc=0;
  for(var k in D){if(inc[k]&&(inc[k].tipo||inc[k].desc))numInc++;}

  var L=[
    "🚧 PMT | LP-CARDIQUE-006-2025",
    "📅 Fecha: "+fmtF(fch)+" | ⏰ "+now,
    "👷 Residente: "+res+" | Inspector: "+intv,
    "📊 Avance: "+g.p+"% ("+g.d+"/"+g.t+" ítems)",
    "",
    "✅ CUMPLEN: "+cumplenSi+" | ❌ NO CUMPLEN: "+cumplenNo+" | ⏳ SIN CALIFICAR: "+sinCalif,
    ""
  ];
  for(var k in D){
    var p=prog(k); var em={calicanto:"🔵",chaplundun:"🟡",ricaurte:"🟢"};
    var emoji=p.p===100?"✅":p.p>=60?"⚠️":"❌";
    L.push(em[k]+" "+D[k].label.toUpperCase()+" ("+p.p+"%): "+emoji+(horaFrente[k]?" ["+horaFrente[k]+"]":""));
  }
  if(criticosNoCumple.length>0){
    L.push("");L.push("⛔ CRÍTICOS NO CONFORMES:");
    criticosNoCumple.slice(0,8).forEach(function(t){L.push(t);});
    if(criticosNoCumple.length>8)L.push("... y "+(criticosNoCumple.length-8)+" más");
  }
  L.push("");
  L.push("📋 Incidentes: "+numInc+" reportado(s)");
  L.push("─────────────────");
  L.push("PMT v02 · INVIAS 2024");
  compartirTextoDirecto(L.join("\n"));
}

function compartirTextoDirecto(txt){
  if(navigator.share){
    navigator.share({title:"PMT — Inspección de Campo | Ciénaga de la Virgen", text:txt})
      .then(function(){toast("✓ Compartido","ok")})
      .catch(function(e){if(e.name!=="AbortError")copiarTexto(txt);});
  } else {
    var url="https://wa.me/?text="+encodeURIComponent(txt.slice(0,2000));
    window.open(url,"_blank");
    toast("Abriendo WhatsApp...","ok");
  }
}

function copiarTexto(txt){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){toast("✓ Copiado al portapapeles","ok")}).catch(function(){copiarLegacy(txt);});
  } else { copiarLegacy(txt); }
}

function copiarLegacy(txt){
  try{
    var ta=document.createElement("textarea");
    ta.value=txt;ta.style.cssText="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0";
    document.body.appendChild(ta);ta.focus();ta.select();
    var ok=document.execCommand("copy");
    document.body.removeChild(ta);
    toast(ok?"✓ Copiado al portapapeles":"⚠ Selecciona el texto y cópialo",ok?"ok":"err");
  }catch(e){toast("⚠ Selecciona el texto y cópialo manualmente","err");}
}

function svgPieChart(pct, color, label, size){
  size = size||120;
  var r=46, cx=60, cy=60;
  var angle = pct/100*Math.PI*2;
  var x1=cx+r*Math.sin(0), y1=cy-r*Math.cos(0);
  var x2=cx+r*Math.sin(angle), y2=cy-r*Math.cos(angle);
  var large=pct>50?1:0;
  var restAngle=(100-pct)/100*Math.PI*2;
  var rx1=cx+r*Math.sin(angle), ry1=cy-r*Math.cos(angle);
  var rx2=cx+r*Math.sin(Math.PI*2-0.001), ry2=cy-r*Math.cos(Math.PI*2-0.001);
  var rLarge=(100-pct)>50?1:0;
  var svg='<svg width="'+size+'" height="'+(size+24)+'" viewBox="0 0 120 144" xmlns="http://www.w3.org/2000/svg">';
  svg+='<circle cx="60" cy="60" r="46" fill="#E2E8F0"/>';
  if(pct>0 && pct<100){
    svg+='<path d="M '+cx+' '+cy+' L '+x1+' '+y1+' A 46 46 0 '+large+' 1 '+x2+' '+y2+' Z" fill="'+color+'"/>';
  } else if(pct>=100){
    svg+='<circle cx="60" cy="60" r="46" fill="'+color+'"/>';
  }
  svg+='<circle cx="60" cy="60" r="30" fill="white"/>';
  svg+='<text x="60" y="56" text-anchor="middle" font-size="14" font-weight="bold" fill="'+color+'">'+pct+'%</text>';
  svg+='<text x="60" y="70" text-anchor="middle" font-size="9" fill="#64748B">CUMPLE</text>';
  svg+='<text x="60" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#334155">'+label+'</text>';
  svg+='</svg>';
  return svg;
}

      h+='<div style="padding:4px 11px;background:#F1F5F9;font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #E2E8F0">'+s.lbl+'</div>';
      for(var ii=0;ii<s.its.length;ii++){
        var it=s.its[ii]; var ok=checks[it.id];
        var estadoExtra="";
        if(ok&&cumple[it.id]!==undefined){ estadoExtra=cumple[it.id]?" ✅ CUMPLE":" ❌ NO CUMPLE"; }
        else if(ok){ estadoExtra=" ⏳ SIN CALIFICAR"; }
        h+='<div style="display:flex;align-items:flex-start;gap:7px;padding:5px 11px;border-bottom:1px solid #F8FAFC;font-size:10px;'+(ok?'background:#F0FDF4':'')+'\">';
        h+='<span style="width:16px;height:16px;border:1.5px solid '+(ok?'#166534':'#94A3B8')+';border-radius:3px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px;background:'+(ok?'#DCFCE7':'#fff')+'">'+(ok?'✓':'')+'</span>';
        h+='<span style="flex:1;line-height:1.35;'+(ok?'color:#6B7280;text-decoration:line-through':'')+'" >'+it.t+estadoExtra+'</span>'+(it.c?'<span style="background:#FEE2E2;color:#991B1B;font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;white-space:nowrap">⛔ CRÍTICO</span>':'')+'</div>';
        if(itemNotas[it.id]) h+='<div style="font-size:9px;color:#64748B;padding:2px 11px 4px 35px;background:'+(ok?'#F0FDF4':'#fff')+'">📝 '+itemNotas[it.id]+'</div>';
      }
    }
    var n=notas[k]; if(n&&n.trim()) h+='<div style="padding:4px 11px;background:#F1F5F9;font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.4px;border-top:1px solid #E2E8F0;border-bottom:1px solid #E2E8F0">📝 Observaciones</div><div style="padding:7px 11px;background:#FFFBEB;font-size:10px;line-height:1.5">'+n.replace(/\n/g,"<br>")+'</div>';
    var iv=inc[k]; if(iv&&(iv.tipo||iv.desc)){
      var graveBg=(iv.gravedad==="Grave")?"background:#FEE2E2":"background:#FFFBEB";
      h+='<div style="padding:4px 11px;background:#F1F5F9;font-size:9px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.4px;border-top:1px solid #E2E8F0;border-bottom:1px solid #E2E8F0">🚨 Incidente Vial'+(iv.gravedad==="Grave"?' <span style="background:#FEE2E2;color:#991B1B;padding:1px 4px;border-radius:3px">GRAVE</span>':'')+'</div>';
      h+='<div style="padding:7px 11px;font-size:10px;line-height:1.5;'+graveBg+'">';
      h+='<b>Tipo:</b> '+(iv.tipo||'—')+" &nbsp;<b>Gravedad:</b> "+(iv.gravedad||'—')+" &nbsp;<b>Hora:</b> "+(iv.hora||'—')+"<br>";
      h+='<b>Desc:</b> '+(iv.desc||'—')+"<br><b>Acción:</b> "+(iv.acc||'—');
      if(iv.reportado) h+=" &nbsp;✅ <b>Reportado a autoridades</b>";
      h+='</div>';
    }
    h+='</div>';

    // FOTOS 2x2
    var fArr=fotosFrente[k]||[];
    if(fArr.length>0){
      h+='<div style="margin-bottom:12px">';
      h+='<div style="background:#1E293B;color:#fff;padding:6px 11px;border-radius:6px 6px 0 0;font-weight:700;font-size:10px">📷 Registro Fotográfico — '+f.label+' ('+fArr.length+' foto'+(fArr.length>1?'s':'')+')</div>';
      h+='<div style="border:1px solid #E2E8F0;border-top:none;border-radius:0 0 6px 6px;padding:10px;background:#F8FAFC">';
      h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
      for(var fi2=0;fi2<fArr.length;fi2++){
        if(fi2>0 && fi2%4===0) h+='</div><div style="page-break-before:always"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
        h+='<div style="break-inside:avoid">';
        h+='<img src="'+fArr[fi2].data+'" style="width:100%;height:180px;object-fit:cover;border-radius:6px;border:1px solid #E2E8F0">';
        h+='<div style="font-size:9px;color:#64748B;text-align:center;margin-top:3px;font-style:italic">'+(fi2+1)+'. '+(fArr[fi2].caption||'')+'</div>';
        h+='</div>';
      }
      h+='</div></div></div>';
    }
    h+='</div>';
  }

  // ── PÁGINA FINAL: NO CONFORMIDADES + RESUMEN ─────────────────────────
  var ncItems=[];
  for(var kn in D){for(var sin=0;sin<D[kn].secs.length;sin++){var itsn=D[kn].secs[sin].its;for(var iin=0;iin<itsn.length;iin++){var itn=itsn[iin];if(itn.c&&checks[itn.id]&&cumple[itn.id]===false)ncItems.push({t:itn.t,frente:D[kn].label});}}}
  if(ncItems.length>0){
    h+='<div style="page-break-before:always;border:2px solid #E63946;border-radius:7px;margin-bottom:12px;overflow:hidden">';
    h+='<div style="background:#E63946;color:#fff;padding:7px 11px;font-weight:700;font-size:11px">⛔ TABLA DE NO CONFORMIDADES CRÍTICAS ('+ncItems.length+')</div>';
    h+='<table style="width:100%;font-size:10px;border-collapse:collapse">';
    h+='<thead><tr><th style="padding:5px 8px;background:#FEE2E2;color:#991B1B;text-align:left">Ítem</th><th style="padding:5px 8px;background:#FEE2E2;color:#991B1B;text-align:left;width:80px">Frente</th></tr></thead><tbody>';
    ncItems.forEach(function(nc){ h+='<tr><td style="padding:5px 8px;border-bottom:1px solid #FEE2E2">'+nc.t+'</td><td style="padding:5px 8px;border-bottom:1px solid #FEE2E2">'+nc.frente+'</td></tr>'; });
    h+='</tbody></table></div>';
  }

  var rr="";
  for(var kr in D){var pr=prog(kr);rr+='<div style="display:flex;justify-content:space-between;font-size:10px;padding:3px 0;border-bottom:1px solid #F1F5F9"><span>'+D[kr].em+" "+D[kr].label+'</span><span>'+pr.p+"% ("+pr.d+"/"+pr.t+") — "+(pr.p===100?"CONFORME ✓":pr.p>=60?"PARCIAL ⚠":"PENDIENTE ✗")+"</span></div>";}
  h+='<div style="border:2px solid #E85D04;border-radius:7px;padding:10px 12px;margin-top:12px"><div style="font-size:12px;color:#C44B00;margin-bottom:7px;font-weight:700">📊 Resumen Global</div>'+rr+'<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px"><span>Score Ponderado:</span><span style="background:'+scBg+';color:'+scCol+';padding:1px 6px;border-radius:4px;font-weight:700">'+sc+'%</span></div><div style="height:8px;background:#F1F5F9;border-radius:4px;overflow:hidden;margin-top:7px"><div style="height:100%;background:linear-gradient(90deg,#E85D04,#FFBE0B);border-radius:4px;width:'+g.p+'%"></div></div></div>';
  h+='<div style="margin-top:12px;font-size:9px;color:#94A3B8;text-align:center;padding-top:7px;border-top:1px solid #E2E8F0">PMT v03 · INVIAS 2024 · Contrato LP-CARDIQUE-006-2025 · Generado: '+new Date().toLocaleString("es-CO")+'</div>';
  return h;
}

// ============================================================
// COMPARTIR ARCHIVO
// ============================================================
function compartirArchivo(){
  var src=genHTMLLimpio();
  var fn="PMT_v2_Campo.html";
  var blob=new Blob([src],{type:"text/html;charset=utf-8"});
  if(navigator.share&&navigator.canShare){
    try{
      var file=new File([blob],fn,{type:"text/html"});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:"PMT v2 — Checklist de Campo | Ciénaga de la Virgen"})
          .then(function(){toast("✓ Archivo compartido","ok")})
          .catch(function(ex){if(ex.name!=="AbortError")metodo2(blob,fn);});
        return;
      }
    }catch(ex){}
  }
  metodo2(blob,fn);
}

function metodo2(blob,fn){
  try{
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download=fn;a.style.display="none";
    document.body.appendChild(a);a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},400);
    toast("✓ Descargado — envíalo por WhatsApp o email","ok");
  }catch(ex){
    try{
      var reader=new FileReader();
      reader.onload=function(){
        var a2=document.createElement("a");
        a2.href=reader.result;a2.download=fn;a2.style.display="none";
        document.body.appendChild(a2);a2.click();
        setTimeout(function(){document.body.removeChild(a2);},400);
        toast("✓ Descargado","ok");
      };
      reader.readAsDataURL(blob);
    }catch(ex2){toast("⚠ Abre el menú del navegador y usa 'Guardar página'","err");}
  }
}

function genHTMLLimpio(){
  var c=document.documentElement.cloneNode(true);
  c.querySelectorAll(".item.done").forEach(function(el){el.classList.remove("done");});
  c.querySelectorAll(".chk").forEach(function(el){el.textContent="";});
  c.querySelectorAll("textarea").forEach(function(el){el.textContent="";});
  c.querySelectorAll(".inc-w input[type=text]").forEach(function(el){el.setAttribute("value","");});
  c.querySelectorAll(".inc-w select option").forEach(function(o){o.removeAttribute("selected");});
  c.querySelectorAll("#inp-fecha,#inp-residente,#inp-interventoria,#inp-cardique").forEach(function(el){el.setAttribute("value","");});
  var pdfOv=c.querySelector("#pdf-ov"); if(pdfOv) pdfOv.style.display="none";
  return "<!DOCTYPE html>\n"+c.outerHTML;
}

// ============================================================
// HISTORIAL DE INSPECCIONES
// ============================================================
function guardarInspeccion(){
  if(!validarAntesDe("guardar inspección")) return;
  var g = gProg();
  var snapshot = {
    ts: new Date().toISOString(),
    fecha: (document.getElementById("inp-fecha").value) || new Date().toISOString().slice(0,10),
    residente: (document.getElementById("inp-residente").value||"—").trim(),
    global: g.p,
    frentes: {},
    score: calcScore()
  };
  for(var k in D){
    var p = prog(k);
    snapshot.frentes[k] = {pct:p.p, d:p.d, t:p.t};
  }
  var hist = [];
  try{ var raw=localStorage.getItem(SK_HIST); if(raw) hist=JSON.parse(raw); }catch(e){}
  hist.push(snapshot);
  if(hist.length > 30) hist = hist.slice(hist.length - 30);
  try{ localStorage.setItem(SK_HIST, JSON.stringify(hist)); }catch(e){}
  toast("✓ Inspección guardada en historial","ok");
}

function borrarHistorial(){
  if(!confirm("¿Borrar todo el historial de inspecciones guardadas?")) return;
  try{ localStorage.removeItem(SK_HIST); }catch(e){}
  toast("✓ Historial borrado","ok");
  renderHistorial();
}

function renderHistorial(){
  var hist = [];
  try{ var raw=localStorage.getItem(SK_HIST); if(raw) hist=JSON.parse(raw); }catch(e){}
  var h = '<div class="score-card">';
  h += '<div class="score-title">📅 Historial de Inspecciones Guardadas</div>';
  if(hist.length === 0){
    h += '<div style="color:var(--dm);font-size:13px;padding:10px 0">No hay inspecciones guardadas. Usa el botón <b>Guardar Inspección</b> en Resumen.</div>';
  } else {
    h += '<div style="overflow-x:auto"><table class="stats-table"><thead><tr><th>#</th><th>Fecha</th><th>Inspector</th><th>Global</th><th>Calicanto</th><th>Chaplundún</th><th>Ricaurte</th><th>Score ⭐</th></tr></thead><tbody>';
    for(var i=hist.length-1;i>=0;i--){
      var sn=hist[i];
      var glCol=sn.global>=90?"var(--vd)":sn.global>=70?"var(--am)":"var(--rj)";
      var sc2Col=sn.score>=90?"var(--vd)":sn.score>=70?"var(--am)":"var(--rj)";
      var delta="";
      if(i<hist.length-1){ var diff=sn.global-hist[i+1].global; delta=diff>0?' <span style="color:var(--vd)">▲'+diff+'%</span>':diff<0?' <span style="color:var(--rj)">▼'+Math.abs(diff)+'%</span>':' <span style="color:var(--dm)">—</span>'; }
      var hora=""; try{ hora=new Date(sn.ts).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"}); }catch(e){}
      h+='<tr>';
      h+='<td style="color:var(--dm)">'+(hist.length-i)+'</td>';
      h+='<td style="white-space:nowrap;font-size:10px">'+(sn.fecha||sn.ts.slice(0,10))+'<br><span style="color:var(--dm);font-size:9px">'+hora+'</span></td>';
      h+='<td style="font-size:10px">'+(sn.residente||"—")+'</td>';
      h+='<td style="font-weight:900;color:'+glCol+'">'+sn.global+'%'+delta+'</td>';
      h+='<td>'+((sn.frentes&&sn.frentes.calicanto)?sn.frentes.calicanto.pct+"%":"—")+'</td>';
      h+='<td>'+((sn.frentes&&sn.frentes.chaplundun)?sn.frentes.chaplundun.pct+"%":"—")+'</td>';
      h+='<td>'+((sn.frentes&&sn.frentes.ricaurte)?sn.frentes.ricaurte.pct+"%":"—")+'</td>';
      h+='<td style="font-weight:700;color:'+sc2Col+'">'+(sn.score||"—")+'%</td>';
      h+='</tr>';
    }
    h+='</tbody></table></div>';
    // Gráfica de tendencia
    if(hist.length>=2){
      h+='<div style="margin-top:16px"><div style="font-size:10px;font-weight:700;color:var(--dm);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Tendencia de Cumplimiento Global</div>';
      for(var j=0;j<hist.length;j++){
        var sj=hist[j];
        var bCol=sj.global>=90?"var(--vd)":sj.global>=70?"var(--am)":"var(--rj)";
        h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">';
        h+='<span style="font-size:9px;color:var(--dm);width:60px">'+(sj.fecha||sj.ts.slice(0,10))+'</span>';
        h+='<div style="flex:1;height:16px;background:var(--br);border-radius:4px;overflow:hidden"><div style="height:100%;width:'+sj.global+'%;background:'+bCol+';display:flex;align-items:center;padding-left:4px;font-size:9px;font-weight:700;color:#fff">'+sj.global+'%</div></div>';
        h+='</div>';
      }
      h+='</div>';
    }
  }
  h+='</div>';
  h+='<div style="display:flex;gap:10px;margin-top:12px">';
  h+='<button class="ebtn e1" style="flex:1" onclick="guardarInspeccion()"><span class="ei">💾</span>Guardar Actual</button>';
  h+='<button class="ebtn" style="flex:1;background:rgba(230,57,70,.2);border:1px solid rgba(230,57,70,.4);color:var(--rj);font-family:inherit;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:14px 8px;border-radius:12px;cursor:pointer" onclick="borrarHistorial()"><span class="ei">🗑</span>Borrar Historial</button>';
  h+='</div>';
  document.getElementById("hist-inner").innerHTML = h;
}
